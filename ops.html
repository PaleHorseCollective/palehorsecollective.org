<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHC // MISSION CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0a08;
    --void-2: #111110;
    --void-3: #1a1a18;
    --bone: #e8e0d0;
    --bone-dim: #a09888;
    --bone-dimmer: #504840;
    --gold: #b8960c;
    --gold-dim: #7a6408;
    --red: #8b1a1a;
    --green: #4aff91;
    --green-dim: #1a7a44;
    --amber: #ff9f1c;
    --amber-dim: #7a4a08;
    --border: #2a2a28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--bone);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 998;
    opacity: 0.4;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: scan 8s linear infinite;
    z-index: 999;
    pointer-events: none;
    opacity: 0.2;
  }

  @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:0.7} 97%{opacity:1} 98%{opacity:0.5} 99%{opacity:1} }

  /* AUTH */
  #auth {
    position: fixed; inset: 0;
    background: var(--void);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 48px;
  }
  .auth-logo { font-family: 'Oswald', sans-serif; font-size: clamp(20px, 4vw, 32px); letter-spacing: 10px; color: var(--bone); animation: flicker 5s infinite; text-align: center; }
  .auth-logo span { color: var(--gold); }
  .auth-sub { font-size: 9px; letter-spacing: 4px; color: var(--bone-dimmer); margin-top: 8px; text-align: center; }
  .auth-form { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 280px; }
  .auth-label { font-size: 9px; letter-spacing: 4px; color: var(--bone-dimmer); align-self: flex-start; }
  .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--bone-dimmer); color: var(--bone); font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 4px; padding: 10px 0; outline: none; text-align: center; transition: border-color 0.3s; }
  .auth-input:focus { border-bottom-color: var(--gold); }
  .auth-btn { width: 100%; background: transparent; border: 1px solid var(--bone-dimmer); color: var(--bone); font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 4px; padding: 14px; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
  .auth-btn:hover { border-color: var(--gold); color: var(--gold); }
  .auth-error { font-size: 9px; letter-spacing: 3px; color: var(--red); height: 14px; }
  .auth-foot { position: absolute; bottom: 24px; font-size: 9px; letter-spacing: 3px; color: var(--bone-dimmer); }

  /* DASHBOARD */
  #dash { display: none; }

  /* TOPBAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--void); z-index: 100; }
  .tb-left { display: flex; align-items: center; gap: 24px; }
  .tb-mark { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 6px; }
  .tb-mark span { color: var(--gold); }
  .tb-live { font-size: 9px; letter-spacing: 3px; color: var(--green); display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  .tb-right { font-size: 9px; letter-spacing: 2px; color: var(--bone-dimmer); }

  /* HERO */
  .hero { padding: 48px 32px 36px; border-bottom: 1px solid var(--border); animation: fadeUp 0.5s ease both; }
  .hero-class { font-size: 9px; letter-spacing: 4px; color: var(--bone-dimmer); margin-bottom: 10px; }
  .hero-title { font-family: 'Oswald', sans-serif; font-size: clamp(30px, 5vw, 56px); letter-spacing: 6px; line-height: 1; }
  .hero-title span { color: var(--gold); }
  .hero-sub { font-size: 10px; letter-spacing: 3px; color: var(--bone-dimmer); margin-top: 10px; }

  /* NEXT PRIORITY BANNER */
  .priority-banner { padding: 14px 32px; background: var(--gold-dim); border-bottom: 1px solid var(--gold); display: flex; align-items: center; gap: 16px; animation: fadeUp 0.5s 0.05s ease both; opacity: 0; }
  .pb-label { font-size: 8px; letter-spacing: 4px; color: var(--gold); flex-shrink: 0; }
  .pb-arrow { color: var(--gold); opacity: 0.6; }
  .pb-text { font-size: 10px; letter-spacing: 2px; color: var(--bone); }

  /* PHASES */
  .phases { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; animation: fadeUp 0.5s 0.1s ease both; opacity: 0; }
  .phase { padding: 16px 28px; border-right: 1px solid var(--border); min-width: 160px; flex-shrink: 0; }
  .phase.now { background: var(--void-3); border-top: 2px solid var(--gold); }
  .phase.done { border-top: 2px solid var(--green-dim); }
  .ph-num { font-size: 8px; letter-spacing: 3px; color: var(--bone-dimmer); margin-bottom: 4px; }
  .ph-name { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 4px; margin-bottom: 4px; }
  .phase.now .ph-name { color: var(--gold); }
  .phase.done .ph-name { color: var(--green); }
  .ph-time { font-size: 8px; letter-spacing: 2px; color: var(--bone-dimmer); }
  .ph-badge { display: inline-block; font-size: 8px; letter-spacing: 2px; padding: 2px 8px; margin-top: 6px; }
  .ph-badge.active { background: var(--gold-dim); color: var(--gold); }
  .ph-badge.complete { background: var(--green-dim); color: var(--green); }
  .ph-badge.pending { border: 1px solid var(--border); color: var(--bone-dimmer); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 32px; animation: fadeUp 0.5s 0.2s ease both; opacity: 0; }
  @media (max-width: 960px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; padding: 16px; } .topbar { padding: 12px 16px; } .hero { padding: 32px 16px 24px; } .priority-banner { padding: 12px 16px; } }

  /* CARDS */
  .card { background: var(--void-2); border: 1px solid var(--border); padding: 24px; transition: border-color 0.3s; }
  .card:hover { border-color: var(--bone-dimmer); }
  .card.w2 { grid-column: span 2; }
  .card.w3 { grid-column: span 3; }
  @media (max-width: 960px) { .card.w2, .card.w3 { grid-column: span 2; } }
  @media (max-width: 600px) { .card.w2, .card.w3 { grid-column: span 1; } }
  .card-ref { font-size: 8px; letter-spacing: 3px; color: var(--bone-dimmer); margin-bottom: 12px; display: flex; justify-content: space-between; }
  .card-title { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 4px; margin-bottom: 20px; }

  /* LAST SESSION */
  .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .session-grid { grid-template-columns: 1fr; } }
  .session-meta { display: flex; flex-direction: column; gap: 8px; }
  .sm-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }

  .sm-label { font-size: 8px; letter-spacing: 3px; color: var(--bone-dimmer); }
  .sm-val { font-size: 9px; letter-spacing: 2px; color: var(--bone); }
  .session-log { display: flex; flex-direction: column; gap: 6px; }
  .sl-item { font-size: 9px; line-height: 1.6; letter-spacing: 1px; color: var(--bone-dim); padding: 8px 12px; background: var(--void-3); border-left: 2px solid var(--gold-dim); }

  /* NODES */
  .nodes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .node { background: var(--void-3); border: 1px solid var(--border); padding: 14px; transition: transform 0.2s; }
  .node:hover { transform: translateY(-1px); }
  .node-ref { font-size: 8px; letter-spacing: 2px; color: var(--bone-dimmer); margin-bottom: 4px; }
  .node-name { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; margin-bottom: 6px; }
  .node.built .node-name { color: var(--green); }
  .node.progress .node-name { color: var(--amber); }
  .node.planned .node-name { color: var(--bone-dim); }
  .node-desc { font-size: 9px; line-height: 1.6; color: var(--bone-dimmer); margin-bottom: 8px; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; letter-spacing: 2px; padding: 2px 8px; }
  .badge.built { background: var(--green-dim); color: var(--green); }
  .badge.progress { background: var(--amber-dim); color: var(--amber); }
  .badge.planned { border: 1px solid var(--border); color: var(--bone-dimmer); }
  .badge.deferred { border: 1px solid var(--border); color: var(--bone-dimmer); opacity: 0.6; }
  .badge.urgent { background: var(--red); color: var(--bone); }
  .badge.live { background: var(--green-dim); color: var(--green); }
  .bdot { width: 4px; height: 4px; border-radius: 50%; }
  .built .bdot, .live .bdot { background: var(--green); }
  .progress .bdot { background: var(--amber); animation: pulse 1s infinite; }
  .planned .bdot, .deferred .bdot { background: var(--bone-dimmer); }

  /* TASKS */
  .tasks { display: flex; flex-direction: column; gap: 8px; }
  .task-section { font-size: 8px; letter-spacing: 3px; color: var(--bone-dimmer); margin: 12px 0 6px; }
  .task-section:first-child { margin-top: 0; }
  .task { display: flex; gap: 10px; align-items: flex-start; padding: 12px; background: var(--void-3); border: 1px solid var(--border); border-left: 2px solid transparent; }
  .task.j { border-left-color: var(--gold); }
  .task.c { border-left-color: var(--green); }
  .task.b { border-left-color: var(--red); opacity: 0.7; }
  .task-own { font-size: 8px; letter-spacing: 2px; padding: 2px 6px; flex-shrink: 0; margin-top: 2px; }
  .task.j .task-own { background: var(--gold-dim); color: var(--gold); }
  .task.c .task-own { background: var(--green-dim); color: var(--green); }
  .task.b .task-own { background: var(--red); color: var(--bone); }
  .task-body { font-size: 9px; line-height: 1.6; color: var(--bone-dim); letter-spacing: 1px; }
  .task-pri { font-size: 8px; letter-spacing: 2px; color: var(--bone-dimmer); margin-top: 3px; }

  /* SEQUENCE */
  .seq { display: flex; flex-direction: column; }
  .seq-item { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .seq-item:last-child { border-bottom: none; }
  .seq-n { font-family: 'Oswald', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--border); flex-shrink: 0; width: 36px; line-height: 1.1; }
  .seq-item.now .seq-n { color: var(--gold); }
  .seq-item.done .seq-n { color: var(--green-dim); }
  .seq-title { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 3px; margin-bottom: 3px; }
  .seq-item.now .seq-title { color: var(--gold); }
  .seq-item.done .seq-title { color: var(--green); }
  .seq-desc { font-size: 9px; line-height: 1.6; color: var(--bone-dimmer); letter-spacing: 1px; }

  /* FILES TABLE */
  .files-table { width: 100%; border-collapse: collapse; }
  .files-table th { font-size: 8px; letter-spacing: 3px; color: var(--bone-dimmer); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .files-table td { font-size: 9px; letter-spacing: 1px; color: var(--bone-dim); padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .files-table tr:last-child td { border-bottom: none; }

  /* STACK */
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .stack-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--void-3); border: 1px solid var(--border); }
  .stack-name { font-size: 9px; letter-spacing: 3px; }
  .stack-note { font-size: 8px; letter-spacing: 1px; color: var(--bone-dimmer); margin-top: 2px; }

  /* HOW IT WORKS */
  .how { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 600px) { .how { grid-template-columns: 1fr; } }
  .how-item { background: var(--void-3); border: 1px solid var(--border); padding: 18px; }
  .how-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; }
  .how-text { font-size: 9px; line-height: 1.8; color: var(--bone-dimmer); letter-spacing: 1px; }

  /* FOOTER */
  .footer { padding: 20px 32px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 3px; color: var(--bone-dimmer); margin-top: 16px; }

  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>

const PW = 'outer.court.open';

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function login() {
  const val = document.getElementById('pw').value;
  const err = document.getElementById('err');
  if (val === PW) {
    const auth = document.getElementById('auth');
    auth.style.transition = 'opacity 0.7s';
    auth.style.opacity = '0';
    setTimeout(() => {
      auth.style.display = 'none';
      render();
      document.getElementById('dash').style.display = 'block';

    err.textContent = 'ACCESS DENIED · CLEARANCE INVALID';
    document.getElementById('pw').value = '';
    setTimeout(() => err.textContent = '', 2000);

    pending: ['planned', 'PENDING'],
  };
  const [cls, txt] = map[status] || ['planned', status.toUpperCase()];
  return `<span class="badge ${cls}"><span class="bdot"></span>${txt}</span>`;
}

function render() {
  const now = new Date();
  const d = now.toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

  const phasesHTML = CONFIG.phases.map(p => {
    const cls = p.status === 'now' ? 'now' : p.status === 'done' ? 'done' : '';
    const bdg = p.status === 'now' ? '<div class="ph-badge active">ACTIVE</div>'
              : p.status === 'done' ? '<div class="ph-badge complete">COMPLETE</div>'
              : '<div class="ph-badge pending">PENDING</div>';
    return `<div class="phase ${cls}"><div class="ph-num">PHASE ${p.num}</div><div class="ph-name">${p.name}</div><div class="ph-time">${p.time}</div>${bdg}</div>`;
  }).join('');

  const sessionItems = CONFIG.lastSession.summary.map(s => `<div class="sl-item">${s}</div>`).join('');

  const nodesHTML = CONFIG.systemNodes.map(n =>
    `<div class="node ${n.status}">
      <div class="node-ref">${n.ref}</div>
      <div class="node-name">${n.name}</div>
      <div class="node-desc">${n.desc}</div>
      ${badge(n.status)}
    </div>`
  ).join('');

  const seqHTML = CONFIG.buildSequence.map(s =>
    `<div class="seq-item ${s.status}">
      <div class="seq-n">${s.n}</div>
      <div><div class="seq-title">${s.title}</div><div class="seq-desc">${s.desc}</div></div>
    </div>`
  ).join('');

  const makeTask = (t, type) =>
    `<div class="task ${type}">
      <div class="task-own">${type === 'j' ? 'JUSTIN' : type === 'c' ? 'CLAUDE' : 'BLOCKED'}</div>
      <div><div class="task-body">${t.body}</div><div class="task-pri">${t.pri}</div></div>
    </div>`;

  const tasksHTML = [
    CONFIG.tasks.justin.length ? `<div class="task-section">JUSTIN</div>` + CONFIG.tasks.justin.map(t => makeTask(t, 'j')).join('') : '',
    CONFIG.tasks.claude.length ? `<div class="task-section">CLAUDE</div>` + CONFIG.tasks.claude.map(t => makeTask(t, 'c')).join('') : '',
    CONFIG.tasks.blocked.length ? `<div class="task-section">BLOCKED</div>` + CONFIG.tasks.blocked.map(t => makeTask(t, 'b')).join('') : '',
  ].join('');

  const filesHTML = CONFIG.files.map(f => {
    const remaining = f.edition !== null ? f.edition - f.sold : '—';
    const sold = f.sold !== null ? f.sold : '—';
    const statusBadge = f.status === 'live'
      ? `<span class="badge live"><span class="bdot"></span>LIVE — ${remaining} REMAINING</span>`
      : badge(f.status);
    return `<tr><td>${f.num}</td><td>${f.name}</td><td>${f.tier}</td><td>${f.edition || '—'}</td><td>${sold}</td><td>${statusBadge}</td></tr>`;
  }).join('');

  const stackHTML = CONFIG.stack.map(s =>
    `<div class="stack-row">
      <div><div class="stack-name">${s.name}</div><div class="stack-note">${s.note}</div></div>
      ${badge(s.status)}
    </div>`
  ).join('');

  document.getElementById('dash').innerHTML = `
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-mark">PHC <span>//</span> OPS</div>
        <div class="tb-live"><div class="live-dot"></div>TRANSMISSION ACTIVE</div>
      </div>
      <div class="tb-right">SESSION ${CONFIG.session} · ${d}</div>
    </div>

    <div class="hero">
      <div class="hero-class">FILE REF: PHC-OPS-001 · VERSION ${CONFIG.version} · UPDATED ${CONFIG.updated}</div>
      <div class="hero-title">MISSION <span>CONTROL</span></div>
      <div class="hero-sub">97% AI · 3% HUMAN · JUSTIN POINTS · CLAUDE EXECUTES · THE ARCHIVE GROWS</div>
    </div>

    <div class="priority-banner">
      <div class="pb-label">NEXT PRIORITY</div>
      <div class="pb-arrow">→</div>
      <div class="pb-text">${CONFIG.nextPriority}</div>
    </div>

    <div class="phases">${phasesHTML}</div>

    <div class="grid">

      <!-- LAST SESSION -->
      <div class="card w3">
        <div class="card-ref"><span>SESSION LOG · MOST RECENT</span><span>SESSION ${CONFIG.lastSession.number} · ${CONFIG.lastSession.date}</span></div>
        <div class="card-title">LAST SESSION</div>
        <div class="session-grid">
          <div class="session-meta">
            <div class="sm-row"><span class="sm-label">DATE</span><span class="sm-val">${CONFIG.lastSession.date}</span></div>
            <div class="sm-row"><span class="sm-label">SESSION</span><span class="sm-val">${CONFIG.lastSession.number}</span></div>
            <div class="sm-row"><span class="sm-label">STATE</span><span class="sm-val">${CONFIG.operationalState}</span></div>
            <div class="sm-row"><span class="sm-label">VERSION</span><span class="sm-val">V${CONFIG.version}</span></div>
          </div>
          <div class="session-log">${sessionItems}</div>
        </div>
      </div>

      <!-- SYSTEM NODES -->
      <div class="card w3">
        <div class="card-ref"><span>ALL SYSTEMS · NODE MAP</span><span>PHC-ECO-001</span></div>
        <div class="card-title">SYSTEM ARCHITECTURE</div>
        <div class="nodes">${nodesHTML}</div>
      </div>

      <!-- BUILD SEQUENCE -->
      <div class="card w2">
        <div class="card-ref"><span>DEPLOYMENT SEQUENCE · IN ORDER</span></div>
        <div class="card-title">BUILD SEQUENCE</div>
        <div class="seq">${seqHTML}</div>
      </div>

      <!-- TASK QUEUE -->
      <div class="card">
        <div class="card-ref"><span>CURRENT TASKS · BY OWNER</span></div>
        <div class="card-title">TASK QUEUE</div>
        <div class="tasks">${tasksHTML}</div>
      </div>

      <!-- FILES -->
      <div class="card w2">
        <div class="card-ref"><span>FILE RELEASES · CURRENT STATUS</span></div>
        <div class="card-title">FILES</div>
        <table class="files-table">
          <tr><th>FILE</th><th>NAME</th><th>TIER</th><th>EDITION</th><th>SOLD</th><th>STATUS</th></tr>
          ${filesHTML}
        </table>
      </div>

      <!-- TECH STACK -->
      <div class="card">
        <div class="card-ref"><span>TECH STACK · ~$10 AUD/MONTH</span></div>
        <div class="card-title">STACK</div>
        <div class="stack">${stackHTML}</div>
      </div>

      <!-- HOW THIS WORKS -->
      <div class="card w3">
        <div class="card-ref"><span>OPERATING INSTRUCTIONS</span></div>
        <div class="card-title">HOW THIS WORKS</div>
        <div class="how">
          <div class="how-item">
            <div class="how-label">START A SESSION</div>
            <div class="how-text">Open Cowork. Type: "Read the PHC context files and give me a session briefing." Claude reads phc-status.md and phc-rules.md, knows the full state, presents priorities. No re-explaining. No lost context.</div>
          </div>
          <div class="how-item">
            <div class="how-label">DURING A SESSION</div>
            <div class="how-text">Claude executes tasks from the queue. Justin approves irreversible actions. Justin completes Justin-only tasks. Built files go to /builds or /outputs. The archive grows.</div>
          </div>
          <div class="how-item">
            <div class="how-label">END A SESSION</div>
            <div class="how-text">Claude updates phc-status.md and this dashboard automatically — no asking required. Justin commits to GitHub if web files changed. Netlify deploys in 30 seconds. Next session picks up exactly here.</div>
          </div>
        </div>
      </div>

    </div>

    <div class="footer">
      <div>PALE HORSE COLLECTIVE · MISSION CONTROL · V${CONFIG.version}</div>
      <div>NOT LEFT. NOT RIGHT. AWAKE.</div>
      <div>UPDATED ${CONFIG.updated}</div>
    </div>
  `;

  /* Animate cards in */
  document.querySelectorAll('.card').forEach((c, i) => {
    c.style.opacity = '0';
    c.style.transform = 'translateY(10px)';
    c.style.transition = `opacity 0.4s ${i * 0.04}s ease, transform 0.4s ${i * 0.04}s ease`;
    setTimeout(() => { c.style.opacity = '1'; c.style.transform = 'translateY(0)'; }, 50 + i * 40);
  });
}

</script>
</body>
</html>
